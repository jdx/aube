name: publish-smoke

# Manual npm publish smoke tests for aube itself. These publish tiny,
# disposable packages so we can verify real registry behavior before
# release packages or downstream users depend on aube publish.
#
# npm setup required:
# - @endevco/aube-publish-oidc-smoke must have this workflow configured
#   as a Trusted Publisher on npmjs.com:
#   endevco/aube / .github/workflows/publish-smoke.yml
# - @endevco/aube-publish-otp-smoke must be owned by the same npm account
#   as the NPM_TOKEN repository secret. If that account requires 2FA for
#   writes, prefer setting NPM_OTP_SECRET to that account's base32 TOTP
#   seed so the workflow can generate a fresh OTP immediately before
#   publishing. The manual otp input is a fallback for quick re-runs.

on:
  push:
    branches:
      # Lets maintainers test changes to this workflow before it exists on
      # main. Keep this narrow so normal feature branches never publish.
      - test/npm-publish-smoke
  workflow_dispatch:
    inputs:
      mode:
        description: "Which publish path to exercise"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - oidc
          - otp
      otp:
        description: "Current npm OTP for the token-backed publish path"
        required: false
        type: string

concurrency:
  group: publish-smoke
  cancel-in-progress: false

jobs:
  smoke:
    name: Publish smoke packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DIST_TAG: smoke
      OIDC_PACKAGE: "@endevco/aube-publish-oidc-smoke"
      OTP_PACKAGE: "@endevco/aube-publish-otp-smoke"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Build aube
        run: cargo build -p aube

      - name: Prepare smoke package
        id: pkg
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          VERSION="0.0.0-smoke.${RUN_ID}.${RUN_ATTEMPT}"
          STAGE="$RUNNER_TEMP/aube-publish-smoke"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R npm/smoke-package/. "$STAGE/"
          node - "$STAGE/package.json" "$VERSION" <<'NODE'
          const fs = require('node:fs');
          const [path, version] = process.argv.slice(2);
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.version = version;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          NODE
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Publish with npm Trusted Publishing
        if: ${{ github.event_name == 'push' || inputs.mode == 'both' || inputs.mode == 'oidc' }}
        env:
          STAGE: ${{ steps.pkg.outputs.stage }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          cp -R "$STAGE" "$RUNNER_TEMP/aube-publish-oidc"
          cd "$RUNNER_TEMP/aube-publish-oidc"
          node - "$OIDC_PACKAGE" "$VERSION" <<'NODE'
          const fs = require('node:fs');
          const [name, version] = process.argv.slice(2);
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = name;
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          "$GITHUB_WORKSPACE/target/debug/aube" publish \
            --no-git-checks \
            --access public \
            --tag "$DIST_TAG" \
            --provenance \
            --registry https://registry.npmjs.org/
          npm view "$OIDC_PACKAGE@$VERSION" version

      - name: Publish with token and OTP
        if: ${{ github.event_name == 'push' || inputs.mode == 'both' || inputs.mode == 'otp' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_OTP_SECRET: ${{ secrets.NPM_OTP_SECRET }}
          NPM_OTP: ${{ inputs.otp }}
          STAGE: ${{ steps.pkg.outputs.stage }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is required for the token+OTP smoke path"
            exit 1
          fi
          if [ -n "${NPM_OTP:-}" ]; then
            echo "::add-mask::$NPM_OTP"
          fi
          cp -R "$STAGE" "$RUNNER_TEMP/aube-publish-otp"
          cd "$RUNNER_TEMP/aube-publish-otp"
          node - "$OTP_PACKAGE" "$VERSION" <<'NODE'
          const fs = require('node:fs');
          const [name, version] = process.argv.slice(2);
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = name;
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE
          args=(
            publish
            --no-git-checks
            --access public
            --tag "$DIST_TAG"
            --provenance
            --registry https://registry.npmjs.org/
          )
          if [ -n "${NPM_OTP:-}" ]; then
            args+=(--otp "$NPM_OTP")
          elif [ -n "${NPM_OTP_SECRET:-}" ]; then
            OTP="$(node "$GITHUB_WORKSPACE/npm/scripts/totp.mjs" "$NPM_OTP_SECRET")"
            echo "::add-mask::$OTP"
            args+=(--otp "$OTP")
          fi
          "$GITHUB_WORKSPACE/target/debug/aube" "${args[@]}"
          npm view "$OTP_PACKAGE@$VERSION" version
