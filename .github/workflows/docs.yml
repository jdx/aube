name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "aube.usage.kdl"
      - "crates/**"
      - "Cargo.lock"
      - "benchmarks/results.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 # zizmor: ignore[cache-poisoning] save-if gates writes to main; PRs read-only
        with:
          shared-key: linux
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      - name: Build aube
        run: cargo build
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Render CLI docs from usage spec
        run: |
          ./target/debug/aube usage > aube.usage.kdl
          rm -rf docs/cli && mkdir -p docs/cli
          usage g markdown -mf aube.usage.kdl --out-dir docs/cli --url-prefix /cli
          usage g json     -f aube.usage.kdl > docs/cli/commands.json
      - name: Install docs dependencies with aube
        run: |
          cd docs
          ../target/debug/aube install
      - name: Build docs site with aube
        env:
          AUBE_UPDATE_STARS: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd docs
          ../target/debug/aube run docs:build
          touch .vitepress/dist/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/.vitepress/dist
          # v5 excludes dotfiles by default; .nojekyll is created above
          # to disable GitHub Pages' Jekyll processing for the VitePress
          # build, so it must ship inside the artifact.
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
